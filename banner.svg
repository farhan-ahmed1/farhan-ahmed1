  <text x="248" y="269" font-family="'Courier New', monospace" font-size="13" fill="#6e7681">→</text>
  <text x="264" y="269" font-family="'Courier New', monospace" font-size="13" fill="#c9d1d9">Python · Java · C# · TypeScript · React · AWS</text>

