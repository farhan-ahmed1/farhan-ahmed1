<svg width="1200" height="420" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bgGrad" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#0d1117;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#161b22;stop-opacity:1" />
    </linearGradient>
    <linearGradient id="textGrad" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" style="stop-color:#2ea043;stop-opacity:1" />
      <stop offset="50%" style="stop-color:#3fb950;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#2ea043;stop-opacity:1" />
    </linearGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="2" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <filter id="ascii-glow">
      <feGaussianBlur stdDeviation="0.6" result="coloredBlur"/>
      <feMerge>
        <feMergeNode in="coloredBlur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
    <!-- Dot grid -->
    <pattern id="dots" x="0" y="0" width="30" height="30" patternUnits="userSpaceOnUse">
      <circle cx="15" cy="15" r="1.2" fill="#2ea043" opacity="0.12"/>
    </pattern>
    <!-- Islamic geometric pattern -->
    <pattern id="islamic-geo" x="0" y="0" width="60" height="60" patternUnits="userSpaceOnUse">
      <path d="M30,0 L40,10 L30,20 L20,10 Z" fill="none" stroke="#2ea043" stroke-width="0.5" opacity="0.07"/>
      <path d="M0,30 L10,40 L0,50 L-10,40 Z" fill="none" stroke="#2ea043" stroke-width="0.5" opacity="0.07"/>
      <path d="M60,30 L70,40 L60,50 L50,40 Z" fill="none" stroke="#2ea043" stroke-width="0.5" opacity="0.07"/>
      <path d="M30,60 L40,70 L30,80 L20,70 Z" fill="none" stroke="#2ea043" stroke-width="0.5" opacity="0.07"/>
    </pattern>
    <!-- Islamic star pattern -->
    <pattern id="islamic-star" x="0" y="0" width="80" height="80" patternUnits="userSpaceOnUse">
      <polygon points="40,8 44,20 56,20 46,28 50,40 40,32 30,40 34,28 24,20 36,20" fill="none" stroke="#2ea043" stroke-width="0.4" opacity="0.06"/>
    </pattern>
  </defs>

  <!-- Background -->
  <rect width="1200" height="420" fill="url(#bgGrad)"/>
  <rect width="1200" height="420" fill="url(#dots)"/>
  <rect width="1200" height="420" fill="url(#islamic-geo)"/>
  <rect width="1200" height="420" fill="url(#islamic-star)"/>

  <!-- TERMINAL WINDOW -->
  <rect x="170" y="50" width="860" height="325" rx="10" fill="#161b22" opacity="0.97"/>
  <rect x="170" y="50" width="860" height="325" rx="10" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <!-- Title bar -->
  <rect x="170" y="50" width="860" height="34" rx="10" fill="#21262d"/>
  <rect x="170" y="70" width="860" height="14" fill="#21262d"/>
  <!-- Traffic lights -->
  <circle cx="197" cy="67" r="6" fill="#ff5f57"/>
  <circle cx="218" cy="67" r="6" fill="#febc2e"/>
  <circle cx="239" cy="67" r="6" fill="#28c840"/>
  <!-- Title -->
  <text x="600" y="72" font-family="'Courier New', monospace" font-size="12" fill="#8b949e" text-anchor="middle">farhan@portfolio — ~</text>
  <!-- Divider -->
  <line x1="170" y1="84" x2="1030" y2="84" stroke="#30363d" stroke-width="1"/>

