  <text x="195" y="189" font-family="'Courier New', monospace" font-size="15" filter="url(#ascii-glow)" xml:space="preserve"><tspan fill="#238636">|  _/ _</tspan><tspan fill="#2ea043">__ \|</tspan><tspan fill="#3fb950">  _ &lt;|</tspan><tspan fill="#56d364">  _  |</tspan><tspan fill="#3fb950">/ ___ \|</tspan><tspan fill="#2ea043"> |\  |</tspan><tspan fill="#58a6ff">  / ___ \|</tspan><tspan fill="#388bfd">  _  |</tspan><tspan fill="#79c0ff"> |  | |</tspan><tspan fill="#388bfd"> |___|</tspan><tspan fill="#1f6feb"> |_| |</tspan></text>
