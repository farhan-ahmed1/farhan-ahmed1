  <text x="248" y="287" font-family="'Courier New', monospace" font-size="13" fill="#6e7681">→</text>
  <text x="264" y="287" font-family="'Courier New', monospace" font-size="13" fill="#c9d1d9">CS @ Iowa State University '26</text>

  <text x="200" y="305" font-family="'Courier New', monospace" font-size="13" fill="#c9852a">focus</text>
  <text x="248" y="305" font-family="'Courier New', monospace" font-size="13" fill="#6e7681">→</text>
